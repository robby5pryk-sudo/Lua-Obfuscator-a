<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord Button</title>

<style>

body{
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* tombol */

.discord-btn{
    padding:20px 40px;
    font-size:28px;
    font-weight:bold;
    text-decoration:none;
    border-radius:12px;
    font-family:Arial;
    
    background:black;
    border:3px solid;

    animation:rgb 3s linear infinite;
}

/* animasi rgb */

@keyframes rgb{

0%{
color:red;
border-color:red;
}

33%{
color:lime;
border-color:lime;
}

66%{
color:cyan;
border-color:cyan;
}

100%{
color:red;
border-color:red;
}

}

.discord-btn:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<a class="discord-btn" href="https://discord.gg/Cr452nU5zE" target="_blank">
DISCORD
</a>

</body>
</html>
